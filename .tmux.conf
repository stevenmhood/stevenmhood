# Change prefix key to Ctrl-a, like screen
set-option -g prefix C-a
unbind-key C-b
bind-key a send-prefix

# Last window, similar to screen
bind-key C-a last-window

# New window in cwd
bind c new-window -c "#{pane_current_path}"

# Chooser config, for when there's more than 9 windows
unbind w
bind w choose-tree -Zw -F "#W #{pane_current_path}"

# Allow nested tmux on another machine, control indicated by green vs. gray
bind-key -n M-F11 set-option -g status-fg '#666666' \; set-option -wg window-status-current-fg '#666666'
bind-key -n M-F12 set-option -g status-fg green \; set-option -wg window-status-current-fg green
# 'Control "Up"' switches control to the inner tmux
bind-key -n C-k \
    send-keys M-F12 \; \
    set-option -g status-fg '#666666' \; \
    set-window-option -g window-status-current-fg '#666666' \; \
    set-option -g prefix C-b
# 'Control "Down"' switches control to outer tmux
bind-key -n C-j \
    send-keys M-F11 \; \
    set-option -g status-fg green \; \
    set-window-option -g window-status-current-fg green \; \
    set-option -g prefix C-a

# Allow reloading .tmux.conf
bind-key R source-file ~/.tmux.conf \; display-message "Reloaded .tmux.conf!"

# Toggle sync panes
bind-key S set synchronize-panes

set-window-option -g alternate-screen on
# These two should enable truecolor (24-bit), if possible
set-option -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",*:Tc"
# Extended keys (CSI u) for better modifier key handling
# Disabled globally — CC has a paste bug with csi-u format
# When extended-keys-format is csi-u, tmux encodes CR/LF inside bracketed paste
# as CSI-u sequences (e.g. ESC[13;1u) instead of raw bytes. CC's paste tokenizer
# doesn't decode these, so multi-line paste collapses to a single line.
# Filed: https://github.com/anthropics/claude-code/issues/43169
# set-option -g extended-keys on
# set-option -g extended-keys-format csi-u
set-option -g repeat-time 200

# VI Bindings
set-option -g status-keys vi
set-window-option -g mode-keys vi

# Remap horizontal and vertical splits
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
unbind %
bind - split-window -v -c "#{pane_current_path}"

# Add mapping breaking a pane out of a window
bind-key W break-pane

# Move between panes like VI does
bind-key h select-pane -L
bind-key k select-pane -U
bind-key j select-pane -D
bind-key l select-pane -R

# Resize panes with VI bindings
bind-key H resize-pane -L 5
bind-key K resize-pane -U 5
bind-key J resize-pane -D 5
bind-key L resize-pane -R 5 

# scrollback buffer
set -g history-limit 100000

# window titles
set -g set-titles on
# window manager title string (uses status-bar variables...change this?)
set -g set-titles-string "tmux - [#S.#I] - #T"

# Status bar
set-option -g status on
set-option -g status-left-length 15
set-option -g status-left '#[fg=cyan,bold]#(hostname | cut -d. -f1) '
set-option -g status-right ''

# Default status bar colors
set-option -g status-style 'fg=green bg=black'

# Window titles (red dot when Claude needs attention via @claude-attention)
# @branch is a pane-level option set by Claude hook; falls back to dir basename
set-option -g automatic-rename off
set-option -g window-status-separator '  '
set-option -g window-status-format '#[#{?#{==:#{@claude-attention},1},fg=red bold,}]#I:#{?@branch,#{@branch},#{b:pane_current_path}}#F'
set-option -g window-status-current-format '#[#{?#{==:#{@claude-attention},1},fg=red,fg=green}#,bg=default#,bold]#I:#{?@branch,#{@branch},#{b:pane_current_path}}#F'

# Clear Claude attention flag when switching to a window
set-hook -g after-select-window 'set-option -w @claude-attention 0'

# Pane info
set-option -g pane-border-status top
set-option -g pane-border-format '#[align=centre]#[fg=cyan] [Pane: #P] [PID: #{pane_pid}] [TTY: #{pane_tty}] '

set-option -g update-environment "DISPLAY WINDOWID SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION SESSION_MANAGER TMUX_SESSION"
#set-option -g default-command "${SHELL} -i"
set-option -g default-command ""
